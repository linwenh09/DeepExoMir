# DeepExoMir Training Configuration -- v10 Combined Step 2
# 6-Channel BP + Mixup + R-Drop consistency regularization
# Expected: R-Drop stabilizes predictions across dropout masks

data:
  data_dir: data/processed
  batch_size: 256
  num_workers: 0

training:
  model_version: v8
  epochs: 60
  batch_size: 256
  accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 5.0e-4
  warmup_steps: 1000
  scheduler: cosine_with_warmup
  gradient_clip_norm: 1.0
  backbone_lr_scale: 0.1
  ema_decay: 0.9995
  # v10a: Embedding-level Mixup
  mixup_alpha: 0.2
  mixup_prob: 0.5
  # v10b: R-Drop consistency regularization
  rdrop_alpha: 0.5

loss:
  type: focal
  gamma: 1.0
  alpha: 0.5
  label_smoothing: 0.05

regularization:
  dropout: 0.2
  attention_dropout: 0.15

early_stopping:
  patience: 20
  monitor: val_auc
  min_delta: 0.0005
  mode: max

mixed_precision:
  enabled: true
  dtype: float16

checkpointing:
  save_top_k: 3
  checkpoint_dir: checkpoints/v10_combined2_rdrop/

logging:
  tensorboard_dir: logs/v10_combined2_rdrop/
  log_every_n_steps: 50
