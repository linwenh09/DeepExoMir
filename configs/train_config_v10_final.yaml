# DeepExoMir Training Configuration -- v10 Final Combined
# 6-Channel BP + Mixup + R-Drop + LR Restarts + Emb Augment
# All 5 v10 improvements combined

data:
  data_dir: data/processed
  batch_size: 256
  num_workers: 0

training:
  model_version: v8
  epochs: 60
  batch_size: 256
  accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 5.0e-4
  warmup_steps: 1000
  scheduler: cosine_with_warmup_restarts
  restart_t0_epochs: 10
  restart_t_mult: 2
  min_lr_ratio: 0.01
  gradient_clip_norm: 1.0
  backbone_lr_scale: 0.1
  ema_decay: 0.9995
  # v10a: Embedding-level Mixup
  mixup_alpha: 0.2
  mixup_prob: 0.5
  # v10b: R-Drop consistency regularization
  rdrop_alpha: 0.5

loss:
  type: focal
  gamma: 1.0
  alpha: 0.5
  label_smoothing: 0.05

regularization:
  dropout: 0.2
  attention_dropout: 0.15

early_stopping:
  patience: 20
  monitor: val_auc
  min_delta: 0.0005
  mode: max

mixed_precision:
  enabled: true
  dtype: float16

checkpointing:
  save_top_k: 3
  checkpoint_dir: checkpoints/v10_final/

logging:
  tensorboard_dir: logs/v10_final/
  log_every_n_steps: 50
