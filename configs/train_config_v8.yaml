# DeepExoMir Training Configuration -- Model v8
# Key changes from v7:
#   - Model uses DeepExoMirModelV8 (hybrid encoder + MoE + multi-task)
#   - Multi-task loss combines primary + auxiliary losses
#   - EvoAug augmentation applied during training
#   - Batch size 64 (more params, need more GPU memory)
#   - Accumulation steps 32 for effective batch = 2048
#   - Early stopping patience 20 (more complex model needs more time)
#   - Focal loss gamma 1.0 (further calibration from v7's 1.5)

data:
  data_dir: data/processed
  batch_size: 64            # v8: reduced from 128 (more params + per-token target)
  num_workers: 0

training:
  model_version: v8         # v8: flag to use DeepExoMirModelV8
  epochs: 60                # v8: more epochs for multi-task curriculum
  batch_size: 64            # v8: reduced from 128
  accumulation_steps: 32    # v8: increased to 32, effective batch = 64*32 = 2048
  learning_rate: 1.0e-4
  weight_decay: 5.0e-4
  warmup_steps: 1000
  scheduler: cosine_with_warmup
  gradient_clip_norm: 1.0
  backbone_lr_scale: 0.1
  ema_decay: 0.9995

loss:
  type: focal
  gamma: 1.0               # v8: reduced from 1.5 for better calibration
  alpha: 0.5               # Balanced 1:1 data
  label_smoothing: 0.05

regularization:
  dropout: 0.2              # v8: reduced from 0.3 (EvoAug provides extra reg)
  attention_dropout: 0.15   # v8: slightly reduced

early_stopping:
  patience: 20              # v8: increased from 15 (complex model needs more time)
  monitor: val_auc
  min_delta: 0.0005
  mode: max

mixed_precision:
  enabled: true
  dtype: float16

checkpointing:
  save_top_k: 3
  checkpoint_dir: checkpoints/v8/

logging:
  tensorboard_dir: logs/v8/
  log_every_n_steps: 50
